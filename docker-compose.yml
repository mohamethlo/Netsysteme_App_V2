services:

  # ── Base de données MySQL ────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - netsysteme-network

  # ── Backend Django ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_ENGINE:    django.db.backends.mysql
      DB_HOST:      db
      DB_PORT:      "3306"
      DB_NAME:      ${DB_NAME}
      DB_USER:      ${DB_USER}
      DB_PASSWORD:  ${DB_PASSWORD}
      DEBUG:        "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,netsysteme.vps119029.serveur-vps.net"
      CORS_ALLOWED_ORIGINS: "http://netsysteme.vps119029.serveur-vps.net,https://netsysteme.vps119029.serveur-vps.net"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    expose:
      - "8000"
    networks:
      - netsysteme-network

  # ── Frontend React + Nginx ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - backend
    volumes:
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    networks:
      - netsysteme-network

networks:
  netsysteme-network:
    driver: bridge

volumes:
  mysql_data:
  static_files:
  media_files: